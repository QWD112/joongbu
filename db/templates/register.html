<!doctype html><html lang="ko"><head><meta charset="UTF-8"><title>회원가입 — IndieVault</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#fffbeb,#fef3c7,#fde68a);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:420px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;color:#d97706;letter-spacing:3px}
.logo h1 span{color:#f59e0b}
.card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 8px 32px rgba(245,158,11,.18);border:2px solid #fde68a}
.card h2{font-size:1.2rem;font-weight:700;margin-bottom:10px}
.notice{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:.82rem;color:#92400e;margin-bottom:22px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.8rem;color:#a89060;margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.field input{width:100%;background:#fffdf5;border:1.5px solid #f0e4c0;border-radius:10px;padding:12px 16px;color:#1c1a14;font-family:'Noto Sans KR',sans-serif;font-size:.95rem}
.field input:focus{outline:none;border-color:#f59e0b}
.error{color:#dc2626;font-size:.83rem;margin-bottom:14px;background:#fef2f2;padding:8px 12px;border-radius:8px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#d97706,#f59e0b,#fbbf24);border:none;border-radius:10px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
.btn:hover{transform:translateY(-1px)}
.link{text-align:center;margin-top:18px;font-size:.83rem;color:#a89060}
.link a{color:#d97706;text-decoration:none;font-weight:700}
</style></head><body>
<div class="wrap">
  <div class="logo"><h1>INDIE<span>VAULT</span></h1></div>
  <div class="card">
    <h2>회원가입</h2>
    <div class="notice">🎮 가입 즉시 <strong>50,000 포인트</strong> 지급! 원하는 게임을 후원해보세요.</div>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <div class="field"><label>아이디</label><input type="text" name="username" id="u" placeholder="사용할 아이디"></div>
      <div class="field"><label>비밀번호</label><input type="password" name="password" id="p" placeholder="비밀번호"></div>
      <button type="button" class="btn" onclick="if(!document.getElementById('u').value||!document.getElementById('p').value){alert('모든 항목을 입력해주세요');}else{document.querySelector('form').submit();}">가입하기</button>
    </form>
    <p class="link">이미 계정이 있으신가요? <a href="/login/">로그인</a></p>
  </div>
</div>
</body></html>
