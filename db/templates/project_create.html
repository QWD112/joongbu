<!doctype html><html lang="ko"><head><meta charset="UTF-8"><title>프로젝트 등록 — IndieVault</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#fffdf5;color:#1c1a14;min-height:100vh}
nav{background:#fff;border-bottom:2px solid #fde68a;padding:0 32px;height:60px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(245,158,11,.1)}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:#d97706;letter-spacing:2px;text-decoration:none}
.logo span{color:#f59e0b}
.back{font-size:.83rem;color:#6b6044;text-decoration:none;padding:6px 12px;border-radius:8px;border:1.5px solid #e8d5a0}
.back:hover{border-color:#f59e0b;color:#d97706}
.main{max-width:720px;margin:0 auto;padding:36px 24px 80px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:6px;color:#d97706}
.sub{color:#a89060;font-size:.88rem;margin-bottom:20px}
.notice{background:#fffbeb;border:2px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:.82rem;color:#92400e;margin-bottom:28px}
.section{margin-bottom:28px}
.section-title{font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:#d97706;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #fde68a}
.field{margin-bottom:16px}
.field label{display:block;font-size:.82rem;color:#a89060;margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:#fff;border:1.5px solid #f0e4c0;border-radius:10px;padding:11px 14px;color:#1c1a14;font-family:'Noto Sans KR',sans-serif;font-size:.9rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#f59e0b}
.field textarea{min-height:110px;resize:vertical}
.field select option{background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.reward-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.reward-num{font-size:.72rem;color:#a89060;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.btn-submit{padding:13px 36px;background:linear-gradient(135deg,#d97706,#f59e0b,#fbbf24);border:none;border-radius:10px;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(245,158,11,.3);margin-right:10px}
.btn-cancel{padding:13px 22px;background:transparent;border:1.5px solid #e8d5a0;border-radius:10px;color:#a89060;font-family:'Noto Sans KR',sans-serif;font-size:.9rem;cursor:pointer}
</style></head><body>
<nav><a href="/" class="logo">INDIE<span>VAULT</span></a><a href="/" class="back">← 목록으로</a></nav>
<div class="main">
  <h1>프로젝트 등록</h1>
  <p class="sub">인디 게임을 소개하세요. 관리자 심사 후 공개됩니다.</p>
  <div class="notice">📋 등록 후 관리자 심사를 거쳐야 플랫폼에 공개됩니다. 허위 정보 등록 시 거절됩니다.</div>
  <form method="post" id="cf">
    <div class="section">
      <div class="section-title">기본 정보</div>
      <div class="field"><label>게임 제목 *</label><input type="text" name="title" id="title" placeholder="게임 제목"></div>
      <div class="field"><label>게임 소개 *</label><textarea name="description" id="desc" placeholder="게임을 소개해주세요. 장르, 특징, 스토리 등을 자세히 작성할수록 좋습니다."></textarea></div>
      <div class="row">
        <div class="field"><label>장르 *</label><select name="genre"><option>RPG</option><option>어드벤처</option><option>레이싱</option><option>시뮬레이션</option><option>플랫폼</option><option>전략</option><option>퍼즐</option><option>액션</option><option>호러</option><option>기타</option></select></div>
        <div class="field"><label>목표 금액 (원) *</label><input type="number" name="goal_amount" id="goal" placeholder="5000000" min="100000" step="100000"></div>
      </div>
      <div class="field"><label>펀딩 마감일 *</label><input type="date" name="deadline" id="deadline"></div>
    </div>
    <div class="section">
      <div class="section-title">리워드 설정 (최대 3개)</div>
      {% for i in range(1,4) %}
      <div class="reward-box">
        <div class="reward-num">리워드 {{ i }}</div>
        <div class="row">
          <div class="field"><label>금액 (원)</label><input type="number" name="reward_amount_{{ i }}" placeholder="10000" step="1000"></div>
          <div class="field"><label>내용</label><input type="text" name="reward_desc_{{ i }}" placeholder="게임 얼리 액세스 키"></div>
        </div>
      </div>
      {% endfor %}
    </div>
    <button type="button" class="btn-submit" onclick="
      if(!document.getElementById('title').value||!document.getElementById('desc').value||!document.getElementById('goal').value||!document.getElementById('deadline').value){alert('필수 항목(*)을 모두 입력해주세요.');}
      else if(parseInt(document.getElementById('goal').value)<100000){alert('목표 금액은 최소 100,000원 이상이어야 합니다.');}
      else{document.getElementById('cf').submit();}
    ">등록 신청</button>
    <button type="button" class="btn-cancel" onclick="location.href='/'">취소</button>
  </form>
</div></body></html>
